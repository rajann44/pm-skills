<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="280" fill="#09090B" stroke="#27272A" stroke-width="1"/>

  <!-- Left Column: Input -->
  <g transform="translate(40, 50)">
    <!-- Header -->
    <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#A1A1AA" letter-spacing="1">01 / INPUT</text>
    <rect x="0" y="35" width="180" height="150" fill="#18181B" stroke="#27272A" stroke-width="1" rx="4"/>
    
    <!-- Input Fields -->
    <text x="15" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#F4F4F5">User Product Task</text>
    <text x="15" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#71717A">e.g., "Draft a workspaces PRD,"</text>
    <text x="15" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#71717A">"Prioritize my backlog," or</text>
    <text x="15" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#71717A">"Diagnose activation drop"</text>
    
    <!-- Input Trigger Indicator -->
    <rect x="15" y="140" width="150" height="28" fill="#27272A" rx="3"/>
    <text x="90" y="157" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#F4F4F5" text-anchor="middle" letter-spacing="0.5">PM TRIGGER INITIATED</text>
  </g>

  <!-- Flow Arrow 1 -->
  <path d="M 235,140 L 285,140" stroke="#3F3F46" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)"/>

  <!-- Center Column: Router & Gate -->
  <g transform="translate(300, 50)">
    <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#A1A1AA" letter-spacing="1">02 / ROUTER &amp; GATE</text>
    <rect x="0" y="35" width="200" height="150" fill="#18181B" stroke="#3F3F46" stroke-width="1" rx="4"/>
    
    <!-- Router Header -->
    <text x="15" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#F4F4F5">SKILL.md Task Router</text>
    <text x="15" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#A1A1AA">Routes to relative references</text>
    
    <line x1="15" y1="95" x2="185" y2="95" stroke="#27272A" stroke-width="1"/>
    
    <!-- Context Gate Check -->
    <text x="15" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#10B981">Context Gate Check:</text>
    <text x="25" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E4E4E7">✔ Target ICP Defined</text>
    <text x="25" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E4E4E7">✔ Evidence Base Verified</text>
    <text x="25" y="169" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E4E4E7">✔ Team Runway Constraints</text>
  </g>

  <!-- Flow Arrow 2 (Branching paths) -->
  <path d="M 515,140 C 535,140 535,80 555,80 H 565" stroke="#3F3F46" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)"/>
  <path d="M 515,140 L 565,140" stroke="#3F3F46" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)"/>
  <path d="M 515,140 C 535,140 535,200 555,200 H 565" stroke="#3F3F46" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)"/>

  <!-- Right Column: Reference Engines -->
  <g transform="translate(580, 50)">
    <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#A1A1AA" letter-spacing="1">03 / REF ENGINES</text>
    
    <!-- Card 1: Strategy & Discovery -->
    <rect x="0" y="35" width="180" height="40" fill="#18181B" stroke="#27272A" stroke-width="1" rx="4"/>
    <text x="12" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#F4F4F5">strategy.md &amp; discovery.md</text>
    <text x="12" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#71717A">DHM Moats | Mom Test Interviews</text>
    
    <!-- Card 2: Execution & Conflicts -->
    <rect x="0" y="95" width="180" height="40" fill="#18181B" stroke="#27272A" stroke-width="1" rx="4"/>
    <text x="12" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#F4F4F5">execution.md &amp; conflicts.md</text>
    <text x="12" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#71717A">Shape Up | Prioritization Theater</text>
    
    <!-- Card 3: Metrics & Growth -->
    <rect x="0" y="155" width="180" height="40" fill="#18181B" stroke="#27272A" stroke-width="1" rx="4"/>
    <text x="12" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#F4F4F5">metrics-growth.md</text>
    <text x="12" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#71717A">Step-0/1 Metrics Re-baselining</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow-head" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3F3F46"/>
    </marker>
  </defs>
</svg>
